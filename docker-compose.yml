# EC2 / production:  docker compose up -d --build
# Local dev (optional): docker compose -f docker-compose.dev.yml up --build
#
# Before first run on server:
#   cp .env.production.example .env
#   # add firebase-service-account.json (not in git)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: finsty-apis:local
    pull_policy: never
    container_name: finsty-app
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-3000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account.json
    volumes:
      - ./firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - finsty-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "const p=process.env.PORT||3000; require('http').get('http://127.0.0.1:'+p+'/health', r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: finsty-redis
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server \
            --requirepass "$$REDIS_PASSWORD" \
            --appendonly yes \
            --appendfsync everysec \
            --maxmemory 256mb \
            --maxmemory-policy allkeys-lru
        else
          echo "WARNING: REDIS_PASSWORD is not set — Redis is running without auth (not recommended for production)"
          exec redis-server \
            --appendonly yes \
            --appendfsync everysec \
            --maxmemory 256mb \
            --maxmemory-policy allkeys-lru
        fi
    volumes:
      - redis_data:/data
    networks:
      - finsty-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: finsty-apis:local
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    env_file:
      - .env
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS_ON_START: "false"
    entrypoint:
      - npx
      - sequelize-cli
      - db:migrate
      - --env
      - production
    networks:
      - finsty-network
    profiles:
      - tools

volumes:
  redis_data:

networks:
  finsty-network:
    driver: bridge
