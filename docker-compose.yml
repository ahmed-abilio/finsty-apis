services:
  # ─── Application ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: finsty-app
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account.json
    volumes:
      - ./firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - finsty-network

  # ─── One-off migrations (same image, no Redis dependency) ───────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS_ON_START: "false"
    entrypoint:
      - npx
      - sequelize-cli
      - db:migrate
      - --env
      - production
    networks:
      - finsty-network
    profiles:
      - tools

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finsty-redis
    restart: unless-stopped
    # Not published to the host — app reaches Redis at redis:6379 on finsty-network.
    # If you need host access (e.g. redis-cli), add: ports: ['6380:6379']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec
        else
          exec redis-server --appendonly yes --appendfsync everysec
        fi
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsty-network

volumes:
  redis_data:

networks:
  finsty-network:
    driver: bridge
